networks:
  taskflow_network:
    name: taskflow_network
    driver: bridge

services:
  # ─────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - taskflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ─────────────────────────────
  # Backend — Hono API Server
  # ─────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskflow}:${POSTGRES_PASSWORD:-taskflow_secret}@db:5432/${POSTGRES_DB:-taskflow}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 3000
      CORS_ORIGIN: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskflow_network

  # ─────────────────────────────
  # Frontend — React + Nginx
  # ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    ports:
      - "8880:80"
    depends_on:
      - server
    networks:
      - taskflow_network

volumes:
  postgres_data: